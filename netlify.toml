[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — every path serves index.html so react-router-dom can
# handle client-side routing (including /auth/callback and /app/**).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
